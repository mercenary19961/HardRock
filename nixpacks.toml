[phases.setup]
nixPkgs = ['nodejs_20', 'php83', 'php83Packages.composer']

[phases.install]
cmds = [
    'composer install --no-dev --optimize-autoloader',
    'npm ci'
]

[phases.build]
cmds = [
    'npm run build',
    'php artisan config:clear',
    'php artisan route:clear',
    'php artisan view:clear'
]

# Run the Inertia SSR Node process and the PHP server side-by-side.
# - The SSR loop auto-restarts the Node renderer if it crashes; if it stays
#   down, Inertia falls back to client-only rendering (degraded SEO but
#   service stays up).
# - `exec` hands the foreground over to PHP so SIGTERM from the host
#   reaches the web server directly.
[start]
cmd = '''
php artisan migrate --force
( while true; do node bootstrap/ssr/ssr.js; echo "[SSR] exited, restarting in 1s" >&2; sleep 1; done ) &
sleep 2
exec php artisan serve --host=0.0.0.0 --port=${PORT:-8000}
'''

[variables]
INERTIA_SSR_ENABLED = "true"
